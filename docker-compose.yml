version: '3.8'

services:
  server:
    build: 
      context: .
      dockerfile: Dockerfile.server
    command: ["8080"] 
    ports:
      - "8080:8080/tcp" 
      - "8080:8080/udp" 
    networks:
      - flight-net

  # ==========================================
  # --- AIRCRAFT 1 ---
  # ==========================================
  ac1-network:
    image: alpine:latest
    command: ["sleep", "infinity"] 
    networks:
      - flight-net

  anemo-ac1:
    build:
      context: .
      dockerfile: Dockerfile.anemo
    command: ["server", "8080"] 
    network_mode: "service:ac1-network"
    depends_on:
      - server
      - ac1-network

  fuel-ac1:
    build:
      context: .
      dockerfile: Dockerfile.fuel
    command: ["server", "8080"]
    network_mode: "service:ac1-network"
    depends_on:
      - server
      - ac1-network

  siren-ac1:
    build:
      context: .
      dockerfile: Dockerfile.siren
    command: ["server", "8080"]
    network_mode: "service:ac1-network"
    depends_on:
      - server
      - ac1-network

  # --- NOVO: PILOTO DA AERONAVE 1 ---
  user-ac1:
    build:
      context: .
      dockerfile: Dockerfile.user
    command: ["server", "8080"]
    network_mode: "service:ac1-network"
    stdin_open: true # Mantém o canal do teclado aberto
    tty: true        # Simula uma tela de terminal real
    depends_on:
      - server
      - ac1-network

  # ==========================================
  # --- AIRCRAFT 2 ---
  # ==========================================
  ac2-network:
    image: alpine:latest
    command: ["sleep", "infinity"]
    networks:
      - flight-net

  anemo-ac2:
    build:
      context: .
      dockerfile: Dockerfile.anemo
    command: ["server", "8080"]
    network_mode: "service:ac2-network"
    depends_on:
      - server
      - ac2-network

  fuel-ac2:
    build:
      context: .
      dockerfile: Dockerfile.fuel
    command: ["server", "8080"]
    network_mode: "service:ac2-network"
    depends_on:
      - server
      - ac2-network

  siren-ac2:
    build:
      context: .
      dockerfile: Dockerfile.siren
    command: ["server", "8080"]
    network_mode: "service:ac2-network"
    depends_on:
      - server
      - ac2-network

  # --- NOVO: PILOTO DA AERONAVE 2 ---
  user-ac2:
    build:
      context: .
      dockerfile: Dockerfile.user
    command: ["server", "8080"]
    network_mode: "service:ac2-network"
    stdin_open: true 
    tty: true        
    depends_on:
      - server
      - ac2-network

networks:
  flight-net:
    driver: bridge